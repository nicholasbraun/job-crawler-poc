ing it from a burden into a powerful competitive edge for people who grow businesses and build a reputation in their inbox. Think real estate, consultants, recruiters - people who spend hours on emails, scheduling, and follow ups. Unlike other startups, we're a pure-play applied AI company and not a SaaS company with AI features hastily bolted on. We use the best techniques (fine-tuned open-source models, tool use, and retrieval-augmented generation), and as a result, users send 53% of the email drafts we generate.   </p><p style=\"min-height:1.5em\"></p><h2><strong><u>How has it been going? </u></strong></h2><p style=\"min-height:1.5em\">We've grown from 30 people to 120 people in the last 12 months. We are backed by top-tier investors including: Marc Benioff (Founder of Salesforce), Harry Stebbings (Founder of 20VC), Douwe Kiela (Founder/CEO Contextual AI/Creator of RAG), David Singleton (Former CTO of Stripe), Des Traynor (CTO Intercom), Madrona (First Investors in Amazon/Snowflake).   </p><p style=\"min-height:1.5em\"></p><div style=\"text-align:left\"><img style=\"max-width:100%\" src=\"https://app.ashbyhq.com/api/images/user-content/97f70be0-7990-41cc-8922-cd7b2f28c0f7/6f70140c-c19e-4374-930f-66fc77ea7d72/1758567259682-793d404.png\" /></div><h2><strong><u>What do we value? </u></strong></h2><h1></h1><p style=\"min-height:1.5em\">We're very intentional about adding new people. We believe a small team of exceptional people working hard at a problem they care about will always outperform a larger, more unfocused team. That means you'll need to bring an intensity to this role that might not be expected at other companies but it also means you'll be fast-tracked into roles with greater responsibilities far earlier.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>If this excites you, we'd love to hear from you. </strong> <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.linkedin.com/in/archie-hollingsworth-a07168152/\">Archie</a> , <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.linkedin.com/in/matt-ffrench/\">Matt</a> , <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.linkedin.com/in/richard-hollingsworth-444b8589/\">Rich</a> and the Fyxer Team</p>","jobBoardBottomDescriptionHtml":"<p style=\"min-height:1.5em\"></p>","jobPostingBackUrl":null},"appConfirmationTrackingPixelHtml":null,"recruitingPrivacyPolicyUrl":null,"timezone":"Europe/London","candidateScheduleCancellationReasonRequirementStatus":"Optional","showCookieBanner":false},"posting":null,"jobBoard":{"teams":[{"id":"6932d427-5ea8-4fda-952f-aeb50cac7c74","organizationId":"97f70be0-7990-41cc-8922-cd7b2f28c0f7","createdAt":"2025-09-23T09:19:23.091Z","updatedAt":"2025-09-23T09:19:23.091Z","name":"Product","externalName":null,"parentTeamId":null,"label":"6932d427_5ea8_4fda_952f_aeb50cac7c74","path":"root.6932d427_5ea8_4fda_952f_aeb50cac7c74","isArchived":false,"importedId":null,"importSource":null},{"id":"5ce75714-9e29-492f-bde3-91ed6cb81360","organizationId":"97f70be0-7990-41cc-8922-cd7b2f28c0f7","createdAt":"2025-09-23T09:19:53.345Z","updatedAt":"2025-09-23T09:19:53.345Z","name":"Customer Success","externalName":null,"parentTeamId":null,"label":"5ce75714_9e29_492f_bde3_91ed6cb81360","path":"root.5ce75714_9e29_492f_bde3_91ed6cb81360","isArchived":false,"importedId":null,"importSource":null},{"id":"a9d7fea5-3b98-4c59-a611-b9a51f88d968","organizationId":"97f70be0-7990-41cc-8922-cd7b2f28c0f7","createdAt":"2025-11-27T17:34:33.829Z","updatedAt":"2025-11-27T17:34:33.829Z","name":"Customer Success USA","externalName":null,"parentTeamId":"5ce75714-9e29-492f-bde3-91ed6cb81360","label":"a9d7fea5_3b98_4c59_a611_b9a51f88d968","path":"root.5ce75714_9e29_492f_bde3_91ed6cb81360.a9d7fea5_3b98_4c59_a611_b9a51f88d968","isArchived":false,"importedId":null,"importSource":null}],"jobPostings":[{"id":"6181dd49-0962-4998-9037-603aa7b043c7","title":"Product Lead ","updatedAt":"2026-06-1
