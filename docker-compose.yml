# Shared log-rotation policy applied to every service. Docker's json-file log
# driver is unbounded by default; an overnight run's logs helped fill the disk
# and stall Redis. Caps each container to ~30 MB of logs (10 MB x 3 files).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  crawler:
    build: .
    logging: *default-logging
    # Memory seatbelt (ADR-0032 follow-up, incident 2026-07-22, #182). The crawler
    # was OOM-killed (SIGKILL/137) when its heap grew into the VM: with no limit the
    # kernel was the only backstop, and the killed run was left stuck `running` with
    # no terminal status. Two knobs, sized for the 6 GiB Docker Desktop VM this
    # stack shares -- Redis (<=2 GB), Postgres, and the Prometheus/Grafana/Loki
    # observability stack together claim ~3.5 GiB, leaving ~2.5 GiB for the crawler:
    #   mem_limit   hard cgroup cap. A runaway now kills only the crawler (contained
    #               blast radius -- Redis/Postgres survive with state intact for
    #               resume), not the whole VM. (An 8 GiB VM could afford 4g.)
    #   GOMEMLIMIT  soft limit Go's GC respects (read natively, no code change), set
    #               to ~83% of mem_limit. As the heap approaches it GC applies
    #               backpressure, turning a transient goquery-worker spike into a
    #               slowdown instead of a kill. Re-derive if mem_limit changes.
    # This complements -- does not replace -- bounding data structures (ADR-0032);
    # it guards the transient reclaimable floor, not a leak. If the crawler ever
    # GC-thrashes at the soft limit, lower CRAWL_MAX_WORKERS or grow the VM.
    mem_limit: 2g
    # Pin swap to the RAM cap (memswap_limit == mem_limit disables container swap)
    # so a runaway is killed cleanly at 2 GiB rather than thrashing into swap: a
    # swapped Go heap hangs on GC page-faults, so kill + resume from preserved
    # Redis/Postgres state is the better failure mode than a hung crawler.
    memswap_limit: 2g
    ports:
      - "8080:8080"
    # Forward external DNS to fast public resolvers instead of the embedded
    # 127.0.0.11 default upstream. A discovery crawl resolves thousands of new
    # hosts, and the embedded resolver throttles that load (it becomes the
    # throughput ceiling under concurrency). Service names (redis, postgres) still
    # resolve via the embedded DNS, which forwards only external queries here.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      # Soft heap ceiling Go's GC respects (~83% of mem_limit above). See the
      # memory-seatbelt comment on mem_limit for rationale and re-derivation.
      - GOMEMLIMIT=1700MiB
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_TIMEOUT=${LLM_TIMEOUT}
      - LLM_MAX_WORKERS=${LLM_MAX_WORKERS}
      - CRAWL_MAX_WORKERS=${CRAWL_MAX_WORKERS:-50}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgres://crawler:crawler@postgres:5432/crawler?sslmode=disable
      - REDIS_ADDR=redis:6379
    depends_on:
      - loki
      - postgres
      - redis
    labels:
      - "app=job-crawler"

  redis:
    image: redis:7
    logging: *default-logging
    # Redis holds only transient crawl state (frontier queues, visited set,
    # leases); the durable data is in Postgres. Two guards keep the growing state
    # (see #75) from taking the stack down:
    #   --save ""          disable RDB snapshots. Removes both the on-disk growth
    #                      that filled the disk and the periodic fork memory spikes
    #                      that OOM-killed Redis. Trade-off: a Redis *process*
    #                      restart loses the frontier (a paused run can't resume
    #                      across it); in-process pause/resume is unaffected.
    #   --maxmemory 2gb    cap Redis below the VM so it rejects writes and stays
    #   --maxmemory-policy alive (crawl stalls recoverably, state preserved) instead
    #     noeviction       of the kernel OOM-killing it (container dies, all state
    #                      lost, silent stall). noeviction because frontier data
    #                      can't be evicted without corrupting the crawl.
    command:
      - redis-server
      - --save
      - ""
      - --maxmemory
      - 2gb
      - --maxmemory-policy
      - noeviction
    ports:
      - "6379:6379"

  postgres:
    image: postgres:17
    logging: *default-logging
    environment:
      - POSTGRES_USER=crawler
      - POSTGRES_PASSWORD=crawler
      - POSTGRES_DB=crawler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    logging: *default-logging
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:latest
    logging: *default-logging
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    logging: *default-logging
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
