# Shared log-rotation policy applied to every service. Docker's json-file log
# driver is unbounded by default; an overnight run's logs helped fill the disk
# and stall Redis. Caps each container to ~30 MB of logs (10 MB x 3 files).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  crawler:
    build: .
    logging: *default-logging
    ports:
      - "8080:8080"
    # Forward external DNS to fast public resolvers instead of the embedded
    # 127.0.0.11 default upstream. A discovery crawl resolves thousands of new
    # hosts, and the embedded resolver throttles that load (it becomes the
    # throughput ceiling under concurrency). Service names (redis, postgres) still
    # resolve via the embedded DNS, which forwards only external queries here.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_TIMEOUT=${LLM_TIMEOUT}
      - LLM_MAX_WORKERS=${LLM_MAX_WORKERS}
      - CRAWL_MAX_WORKERS=${CRAWL_MAX_WORKERS:-50}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgres://crawler:crawler@postgres:5432/crawler?sslmode=disable
      - REDIS_ADDR=redis:6379
    depends_on:
      - loki
      - postgres
      - redis
    labels:
      - "app=job-crawler"

  redis:
    image: redis:7
    logging: *default-logging
    # Keep accepting writes even when an RDB snapshot fails (e.g. a full disk).
    # Redis here holds only transient, resumable crawl state (frontier queues,
    # visited set, leases) -- the durable data is in Postgres -- so a stalled
    # snapshot should degrade gracefully rather than halt every crawl with MISCONF
    # (the overnight disk-full failure mode). RDB stays enabled so a Redis restart
    # can still resume a run.
    command: redis-server --stop-writes-on-bgsave-error no
    ports:
      - "6379:6379"

  postgres:
    image: postgres:17
    logging: *default-logging
    environment:
      - POSTGRES_USER=crawler
      - POSTGRES_PASSWORD=crawler
      - POSTGRES_DB=crawler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    logging: *default-logging
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:latest
    logging: *default-logging
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    logging: *default-logging
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    logging: *default-logging
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
