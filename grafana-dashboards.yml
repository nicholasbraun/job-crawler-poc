apiVersion: 1

# Auto-load dashboard JSON files mounted at /var/lib/grafana/dashboards.
# The crawler's dashboards live in ./grafana/dashboards and are edited as code;
# allowUiUpdates lets you tweak a panel in the UI, but the file on disk stays
# the source of truth (re-provisioned on the interval below).
providers:
  - name: crawler
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
